{{- $src := .Destination | strings.TrimPrefix "/" -}}
{{- $img := resources.Get $src -}}
{{- if $img -}}
  {{- $processed := $img.Process "webp q75 lanczos" -}}
  <img src="{{ $processed.RelPermalink }}" alt="{{ .Text }}" width="{{ $processed.Width }}" height="{{ $processed.Height }}"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- else -}}
  <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- end -}}
